name: Release

# Builds installer assets for Windows + Linux on every tagged release.
# Triggered by:
#   * pushing a tag like `v0.2.0`
#   * the Actions "Run workflow" button (workflow_dispatch)
#
# Workflow shape:
#
#   1. `create-release` (single Linux job): creates an EMPTY draft on
#      GitHub. Outputs the new release's id.
#   2. `release` (matrix Linux + Windows): each builds its installers
#      via tauri-action and uploads them to the SHARED draft id from
#      step 1.
#
# This split is critical to avoid a race condition: if both matrix jobs
# tried to "find or create" the draft themselves (the previous design),
# they'd each not see the other's in-flight draft and create their own
# duplicate, leaving us with two half-populated drafts. Pinning the
# draft id up-front + passing it via `needs.create-release.outputs`
# guarantees one draft with all five installers.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create empty draft release
        id: create
        uses: actions/github-script@v7
        with:
          # Returns the draft's numeric id, captured as the job output
          # via `core.setOutput` (the implicit `result`).
          script: |
            const tagName = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `Quill ${tagName}`,
              draft: true,
              prerelease: false,
            });
            core.info(`Created draft release id=${data.id} for tag ${tagName}`);
            return data.id;

  release:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 22.04 gives us the oldest glibc (2.35) that's still in
          # active Canonical support — maximizes portability of the
          # .AppImage to older distros. 24.04 would tie the AppImage to
          # glibc 2.39 which drops too many users.
          - platform: ubuntu-22.04
            bundle-label: linux
          - platform: windows-latest
            bundle-label: windows
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            libgtk-3-dev \
            libasound2-dev \
            libxdo-dev \
            libxtst-dev \
            libxi-dev \
            libx11-dev \
            libxcb1-dev \
            libwayland-dev \
            libxkbcommon-dev \
            build-essential \
            cmake \
            git

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch whisper-cli sidecar (+ bundled libs on Linux)
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            pwsh -File ./scripts/download-whisper-cli.ps1
          else
            bash ./scripts/download-whisper-cli.sh
          fi

      - name: Build installers and upload to shared draft
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Upload to the draft created in `create-release`. tauri-action
          # appends to it instead of trying to find/create on its own.
          releaseId: ${{ needs.create-release.outputs.release_id }}
