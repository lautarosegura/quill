name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build

  backend:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            libgtk-3-dev \
            libasound2-dev \
            libxdo-dev \
            libxtst-dev \
            libxi-dev \
            libx11-dev \
            libxcb1-dev \
            libwayland-dev \
            libxkbcommon-dev

      # CI doesn't need real whisper-cli binaries to run unit/integration
      # tests — Tauri's build.rs just validates that `externalBin` and
      # `resources` paths exist (and that globs match at least one file).
      # We create empty per-platform placeholders:
      #   * Windows: whisper-cli-<triple>.exe + ci-placeholder.dll
      #   * Linux:   whisper-cli-<triple> + ci-placeholder.so
      #   * macOS:   whisper-cli-<triple> (no per-platform resources glob)
      # The `.dll` / `.so` files satisfy the per-platform
      # tauri.<os>.conf.json `resources` glob. Local dev uses
      # scripts/download-whisper-cli.* for the real binaries.
      - name: Stub sidecar + resource placeholders
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          case "${{ matrix.os }}" in
            windows-latest)
              touch "src-tauri/binaries/whisper-cli-x86_64-pc-windows-msvc.exe"
              touch "src-tauri/binaries/ci-placeholder.dll"
              ;;
            macos-latest)
              touch "src-tauri/binaries/whisper-cli-aarch64-apple-darwin"
              chmod +x "src-tauri/binaries/whisper-cli-aarch64-apple-darwin"
              ;;
            ubuntu-latest)
              touch "src-tauri/binaries/whisper-cli-x86_64-unknown-linux-gnu"
              chmod +x "src-tauri/binaries/whisper-cli-x86_64-unknown-linux-gnu"
              touch "src-tauri/binaries/ci-placeholder.so"
              ;;
          esac

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test
